<!doctype html>
<html lang="en" data-mood="chill">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoundScape — Music for every mood</title>
  <meta name="description" content="Mood-driven music player with reactive themes and visualizers." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bg" class="bg-layer"></div>

  <header class="navbar glass">
    <div class="brand">
      <span class="logo">🎧</span>
      <strong>SoundScape</strong>
    </div>
    <form id="searchForm" class="search">
      <input id="searchInput" type="search" placeholder="Search tracks, artists…" />
    </form>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow" id="moodEyebrow">Today's vibe · 😌 Chill</p>
      <h1>Drift into the <span class="grad">SoundScape</span></h1>
      <p class="lede">Pick a mood. Watch the world repaint itself. Press play and disappear.</p>

      <div id="moodSelector" class="moods"></div>
    </section>

    <section>
      <h2 id="sectionTitle">Chill picks</h2>
      <div id="grid" class="grid"></div>
    </section>
  </main>

  <footer id="player" class="player glass hidden">
    <canvas id="visualizer" class="viz"></canvas>
    <div class="player-row">
      <div class="track-info">
        <img id="pArt" alt="" />
        <div class="meta">
          <div id="pTitle" class="title">—</div>
          <div id="pArtist" class="artist">—</div>
        </div>
      </div>

      <div class="controls">
        <div class="btns">
          <button id="prevBtn" aria-label="Previous">⏮</button>
          <button id="playBtn" class="play" aria-label="Play/Pause">▶</button>
          <button id="nextBtn" aria-label="Next">⏭</button>
        </div>
        <div class="progress-row">
          <span id="curTime" class="t">0:00</span>
          <input id="progress" type="range" min="0" max="1000" value="0" />
          <span id="durTime" class="t">0:30</span>
        </div>
      </div>

      <div class="volume">
        <span>🔊</span>
        <input id="volume" type="range" min="0" max="100" value="80" />
      </div>
    </div>
  </footer>

  <audio id="audio" crossorigin="anonymous"></audio>

  <script src="app.js" type="module"></script>
</body>
</html>
